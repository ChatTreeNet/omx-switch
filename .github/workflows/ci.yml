name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          npm run test:run -- --maxWorkers=1 src/lib
          npm run test:run -- --maxWorkers=1 src/app/api
          npm run test:run -- --maxWorkers=1 src/app/page.test.tsx
          npm run test:run -- --maxWorkers=1 src/components/config

      - name: Build
        run: npm run build
